# 開發環境下方便開發與除錯的設定
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.root=INFO
logging.level.com.lianhua.erp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# =====================================
# 本機開發環境專用設定（profile=dev）
# 注意：正式環境請改用 DB_PASSWORD 環境變數，不要依賴此預設密碼
# =====================================
spring.datasource.password=${DB_PASSWORD:manager1}

# =====================================
# MFA AES Encryption Key (開發環境)
# 正式環境請改用 application-prod.properties 或環境變數設定相同 key
# =====================================
app.security.mfa-encryption-key=bH2p9Qz7Kf3wX8LmC4rT9vY2aS6dP1gZ

# =====================================
# CORS & WebSocket 跨域設定 (開發環境)
# =====================================
# 允許本機 localhost 以及目前的伺服器 IP 進行訪問
app.cors.allowed-origins=http://localhost:5173,http://10.147.20.28:5173/