# ============================
# SPRING BOOT APPLICATION
# ============================
spring.application.name=erp
server.port=8080

# ============================
# DATABASE CONFIGURATION
# ============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lianhua}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================
# FLYWAY CONFIGURATION
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
# 允許補跑較新版本的 migration（例如先有 V1 後才加入 V2 時）
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=true
spring.flyway.encoding=UTF-8
spring.flyway.table=flyway_schema_history

# ============================
# LOGGING (Development)
# ============================
logging.level.root=INFO
logging.level.com.lianhua.erp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.boot.autoconfigure.security=WARN

# ============================
# MISCELLANEOUS
# ============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jackson.time-zone=Asia/Taipei
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# Activate profiles
spring.profiles.active=dev

# ============================
# EMAIL CONFIGURATION
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# 寄件帳號（本機預設值；正式環境請改用 MAIL_USERNAME 環境變數）
spring.mail.username=${MAIL_USERNAME:jacobwhuang0415@gmail.com}
# Google 發出的 16 位應用程式密碼（請務必透過環境變數或 Secrets Manager 注入）
# Gmail 應用程式密碼（本機預設為你的 App Password，正式環境請改用 MAIL_PASSWORD 環境變數）
spring.mail.password=${MAIL_PASSWORD:fvvbmclbdrxynbkm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ???????? API ??
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================
# SECURITY / JWT（對應 JwtUtils.java）
# ============================
lianhua.app.jwtSecret=${JWT_SECRET:LianhuaERP_Secure_Secret_Key_2026_Standard_Min_32_Chars}
# Access Token 有效時間（毫秒），預設 1 小時
lianhua.app.jwtExpirationMs=3600000
# Refresh Token 有效時間（秒），預設 7 天
lianhua.app.refreshTokenExpirationSeconds=604800
# MFA 待驗證階段暫存 Token 有效時間（秒），預設 5 分鐘
lianhua.app.mfaPendingExpirationSeconds=300

# 後端在產生前端連結（例如郵件中的 URL）時使用的預設前端基底網址
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ============================
# FRONTEND CONFIGURATION
# ============================
# 忘記密碼請求未帶 resetLinkBaseUrl 時使用的預設前端網址
app.frontend.default-url=${FRONTEND_URL:http://localhost:5173}

# ============================
# AES ENCRYPTION (AesEncryptionService)
# ============================
# 256-bit AES 金鑰（Base64 編碼），建議透過環境變數 AES_KEY 提供，例如：
#   openssl rand -base64 32
# 正式環境務必設定，否則 AesEncryptionService 會停用並在使用時拋出錯誤。
lianhua.crypto.aesKey=${AES_KEY:}

# ============================
# CORS CONFIGURATION
# ============================
# 以逗號分隔允許的前端來源，例如：
# app.cors.allowed-origins=http://localhost:5173,https://erp.example.com
app.cors.allowed-origins=http://localhost:5173